<!doctype html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body><main class="container"><div class="card"><h2>User Registration</h2><form id="registerForm" class="form-grid">
<input name="name" placeholder="Full Name" required><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Password" required><button class="btn">Register</button></form>
<hr><h2>Worker Registration</h2><form id="workerRegisterForm" class="form-grid">
<input name="name" placeholder="Worker Name" required><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Password" required>
<select name="service_category"><option>Electrical Works</option><option>Plumbing</option><option>Carpentry</option><option>Painting</option><option>Masonry</option><option>Cleaning</option><option>Appliance Repair</option></select>
<input name="phone" placeholder="Phone"><input name="latitude" placeholder="Latitude" required><input name="longitude" placeholder="Longitude" required><button class="btn">Register Worker</button></form>
<p><a href="/">Home</a></p></div></main><script src="/static/js/main.js"></script></body></html>
